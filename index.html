<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuestros Viajes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@600;700&family=Bebas+Neue&family=Permanent+Marker&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #fffaf5;
      --text: #1f2937;
      --muted: #6b7280;
      --card: rgba(255,255,255,0.82);
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 165, 0.6), transparent 35%),
        radial-gradient(circle at bottom right, rgba(186, 230, 253, 0.55), transparent 30%),
        linear-gradient(135deg, #fff7ed, #f8fafc 55%, #eff6ff);
    }

    .hero {
      min-height: 85vh;
      display: grid;
      place-items: center;
      padding: 40px 20px;
    }

    .hero-card {
      width: min(1100px, 100%);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(10px);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 40px 28px;
      text-align: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.3rem, 6vw, 5rem);
    }

    .container {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto 70px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
    }

    .trip-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px;
      margin-bottom: 28px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .photo {
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      min-height: 260px;
    }

    .photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo span {
      position: absolute;
      left: 14px;
      bottom: 14px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
    }

    /* MAPA */
    .map-wrap {
      position: relative;
      max-width: 900px;
      margin: 30px auto;
    }

    .map-wrap img {
      width: 100%;
      border-radius: 20px;
    }

    .map-point {
      position: absolute;
      transform: translate(-50%, -50%);
      text-decoration: none;
    }

    .dot {
      width: 16px;
      height: 16px;
      background: red;
      border-radius: 50%;
      border: 3px solid white;
    }

    .future .dot {
      background: #0ea5e9;
    }

    .label {
      margin-top: 6px;
      background: black;
      color: white;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .photo.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      background: repeating-linear-gradient(45deg,#ddd,#ddd 10px,#eee 10px,#eee 20px);
    }

    footer {
      text-align: center;
      margin: 30px;
    }
  </style>
</head>

<body>

<header class="hero">
  <div class="hero-card">
    <h1>Nuestros viajes</h1>
  </div>
</header>

<main class="container">

<!-- MAPA -->
<section>
  <h2 class="section-title">Mapa de nuestros viajes</h2>

  <div class="map-wrap">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/1600px-World_map_-_low_resolution.svg.png">

    <a href="#cusco" class="map-point" style="top: 62%; left: 31%;">
      <div class="dot"></div>
      <div class="label">Cusco</div>
    </a>

    <a href="#barranquilla" class="map-point" style="top: 44%; left: 33%;">
      <div class="dot"></div>
      <div class="label">Barranquilla</div>
    </a>

    <a href="#proximo" class="map-point future" style="top: 46%; left: 34%;">
      <div class="dot"></div>
      <div class="label">Santa Marta</div>
    </a>

  </div>
</section>

<!-- CUSCO -->
<article class="trip-card" id="cusco">
  <h2>Cusco</h2>
  <div class="gallery">
    <div class="photo"><img src="cuscocyi/cusco1.jpg"><span>Centro histórico</span></div>
    <div class="photo"><img src="cuscocyi/cusco2.jpg"><span>Paisajes</span></div>
    <div class="photo"><img src="cuscocyi/cusco3.jpg"><span>Recuerdo</span></div>
  </div>
</article>

<!-- BARRANQUILLA -->
<article class="trip-card" id="barranquilla">
  <h2>Barranquilla</h2>
  <div class="gallery">
    <div class="photo"><img src="barranquillacyi/barranquilla-28.jpg"></div>
    <div class="photo"><img src="barranquillacyi/barranquilla-7.jpg"></div>
    <div class="photo"><img src="barranquillacyi/barranquilla-52.jpg"></div>
  </div>
</article>

<!-- FUTURO -->
<section id="proximo">
  <h2>Santa Marta (próximo)</h2>
  <div class="gallery">
    <div class="photo placeholder">Próximamente</div>
    <div class="photo placeholder">Viaje planeado</div>
    <div class="photo placeholder">Falta completar</div>
  </div>
</section>

</main>

<footer>
  Hecho con cariño ✈️
</footer>

</body>
</html>
